name: Build macOS binaries

permissions:
  contents: write

on:
  push:
    branches:
      - '**'
      - '!appveyor-*'
      - '!freebsd-*'
      - '!pr-review*'
      - '!win32-*'
    tags: [ '*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to upload assets to
        required: false
        type: string

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - os: macos-15-intel
            arch: mac-intel
          - os: macos-26
            arch: mac-arm64
    runs-on: ${{ matrix.os }}
    env:
      BUILD_DIR: build-sketcher
      RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_tag }}
    steps:
    - name: Check tag
      if: startsWith(github.ref, 'refs/tags/')
      run: echo "Building tag ${{ github.ref }}"
    - uses: actions/checkout@v4
    - name: Unbreak python in github actions
      run: |
        find /usr/local/bin -lname '*/Library/Frameworks/Python.framework/*' -delete
        sudo rm -rf /Library/Frameworks/Python.framework/
        brew install --force python3 && brew unlink python3 && brew unlink python3 && brew link --overwrite python3
    - name: Install
      shell: bash
      run: |
        # Keep this package list in sync with the docs:
        # https://github.com/dune3d/dune3d-docs/blob/main/build-macos.rst
        brew install \
          adwaita-icon-theme \
          cmake \
          eigen \
          glm \
          gtk4 \
          gtkmm4 \
          librsvg \
          llvm \
          meson \
          opencascade \
          pkg-config \
          pygobject3 \
          python@3
    - name: Build
      run: bash scripts/build_macos.sh "$BUILD_DIR" && otool -L "$BUILD_DIR/dxfsketcher"
    - name: Install dependencies for bundling
      run: brew install dylibbundler
    - name: Set artifact name
      run: echo "artifact_name=dxfsketcher-${{ matrix.arch }}-$(date +%Y-%m-%d-%H%M)-$(echo ${{ github.ref_name }} | tr / -)" >> $GITHUB_ENV
    - name: Bundle app
      timeout-minutes: 10
      run: |
        bash scripts/bundle_macos.sh "$BUILD_DIR"
        ditto -c -k --keepParent dist/DXF\ Sketcher.app dist/dxfsketcher-${{ matrix.arch }}.zip
    - name: Upload bundle
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.artifact_name }}
        path: "dist/dxfsketcher-${{ matrix.arch }}.zip"
    - name: Upload release bundle
      if: ${{ env.RELEASE_TAG != '' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release upload "$RELEASE_TAG" "dist/dxfsketcher-${{ matrix.arch }}.zip" --repo "${{ github.repository }}" --clobber
