name: Build Linux packages

permissions:
  contents: write

on:
  push:
    branches:
      - '**'
      - '!appveyor-*'
      - '!freebsd-*'
      - '!pr-review*'
    tags:
      - '*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to upload assets to
        required: false
        type: string

jobs:
  build-linux-packages:
    runs-on: ubuntu-24.04
    env:
      BUILD_DIR: build-sketcher
      APPIMAGE_EXTRACT_AND_RUN: 1
      RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_tag }}
    steps:
      - name: Check tag
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "Building tag ${{ github.ref }}"

      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            desktop-file-utils \
            dpkg-dev \
            gir1.2-rsvg-2.0 \
            imagemagick \
            libeigen3-dev \
            libgdk-pixbuf-2.0-dev \
            libglib2.0-bin \
            libglm-dev \
            libgtk-4-bin \
            libgtkmm-4.0-dev \
            libspnav-dev \
            meson \
            ninja-build \
            patchelf \
            pkg-config \
            python3 \
            python3-gi-cairo

      - name: Install linuxdeploy tooling
        run: |
          sudo wget -O /usr/local/bin/linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          sudo wget -O /usr/local/bin/linuxdeploy-plugin-gtk.sh https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          sudo wget -O /usr/local/bin/appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          sudo chmod +x /usr/local/bin/linuxdeploy /usr/local/bin/linuxdeploy-plugin-gtk.sh /usr/local/bin/appimagetool

      - name: Configure sketcher build
        run: meson setup $BUILD_DIR -Dsketcher_only=true

      - name: Build Debian package
        run: bash -x scripts/build_deb.sh $BUILD_DIR

      - name: Build AppImage
        run: bash scripts/build_appimage.sh $BUILD_DIR

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: dxfsketcher-deb
          path: dist/deb/*.deb
          if-no-files-found: error

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: dxfsketcher-appimage
          path: dist/appimage/*.AppImage
          if-no-files-found: error

      - name: Upload release assets
        if: ${{ env.RELEASE_TAG != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/deb/*.deb \
            dist/appimage/*.AppImage \
            --repo "${{ github.repository }}" \
            --clobber
